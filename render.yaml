services:
  - type: web
    name: alibabafood-api
    env: docker
    rootDir: Backend/AlibabaFood.Api
    plan: free
    envVars:
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: alibabafood-db
          property: connectionString
      - key: PayOS__ReturnUrl
        value: "https://alibabafood-frontend-jqay.onrender.com/payment-success"
      - key: PayOS__CancelUrl
        value: "https://alibabafood-frontend-jqay.onrender.com/payment-cancel"

  - type: web
    name: alibabafood-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://alibabafood-api-jqay.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: alibabafood-db
    databaseName: alibabafood
    user: alibabafood_user
    plan: free
