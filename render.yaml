services:
  - type: web
    name: alibabafood-api
    env: docker
    rootDir: Backend/AlibabaFood.Api
    plan: free

  - type: web
    name: alibabafood-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
